name: Publish SDK to npm

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to npm
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Fail if version already published
        run: |
          VERSION="$(node -p "require('./packages/sdk/package.json').version")"
          echo "Checking npm for @rbtc-eventkit/sdk@${VERSION}..."
          if npm view "@rbtc-eventkit/sdk@${VERSION}" version >/dev/null 2>&1; then
            echo "ERROR: @rbtc-eventkit/sdk@${VERSION} already exists on npm."
            exit 1
          fi

      - name: Publish @rbtc-eventkit/sdk
        run: npm publish ./packages/sdk --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

