name: Publish to npm (legacy)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for provenance
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build package
      run: npm run build

  # NOTE: Publishing is handled by:
  # - .github/workflows/publish-sdk.yml (sdk-v* tags)
  # - .github/workflows/publish-worker.yml (worker-v* tags)
